---
name: "Claude Terminal"
description: "Terminal with Anthropic's Claude Code CLI, persistent auth, and packages"
version: "2.2.2"
slug: "claude_terminal"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# External resources
url: "https://github.com/anthropics/claude-code"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Claude Terminal"
panel_admin: true

# Port configuration
ports:
  7681/tcp: null
  2222/tcp: null
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"
  2222/tcp: "SSH server (optional, enable in config)"

# Add-on configuration options
options:
  auto_launch_claude: true
  ha_smart_context: true
  enable_ha_mcp: true
  enable_ssh: false
  ssh_port: 2222
  ssh_authorized_keys: []
  persistent_apk_packages: []
  persistent_pip_packages: []
schema:
  auto_launch_claude: bool?
  ha_smart_context: bool?
  enable_ha_mcp: bool?
  enable_ssh: bool?
  ssh_port: int?
  ssh_authorized_keys:
    - str
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str

# Volume mappings for file access
map:
  - config:rw    # Access to Home Assistant configuration files

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7681]/
