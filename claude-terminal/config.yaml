---
name: "Claude Terminal"
description: "Web terminal with Anthropic's Claude Code CLI and persistent auth"
version: "2.5.1"
slug: "claude_terminal"
init: false

# Prebuilt images on GHCR — the Supervisor pulls these instead of building
# locally (no build OOM, no image blobs in backups). Tag = version below.
image: "ghcr.io/heytcass/{arch}-addon-claude-terminal"

# Supported architectures (armv7 dropped in 2.5.0: HAOS dropped 32-bit ARM,
# and neither Claude Code native builds nor managed Python exist for it)
arch:
  - aarch64
  - amd64

# External resources
url: "https://github.com/heytcass/home-assistant-addons"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Claude Terminal"
panel_admin: true

# Port configuration
ports:
  7681/tcp: null
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options
options:
  auto_launch_claude: true
  claude_auto_update: true
  dangerously_skip_permissions: false
  claude_extra_args: ""
  ha_smart_context: true
  enable_ha_mcp: true
  ha_mcp_version: "7.11.0"
  persistent_apk_packages: []
  persistent_pip_packages: []
schema:
  auto_launch_claude: bool?
  claude_auto_update: bool?
  dangerously_skip_permissions: bool?
  claude_extra_args: str?
  ha_smart_context: bool?
  enable_ha_mcp: bool?
  ha_mcp_version: str?
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str

# Volume mappings for file access
map:
  - config:rw            # Home Assistant configuration files
  - all_addon_configs:rw # Other add-ons' config directories (/addon_configs)
  - share:rw             # Shared folder between add-ons and HA

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7681]/
